<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Intel Pro</title>
    <link type="image/png" sizes="96x96" rel="icon" href="icon.png"> <link type="image/png" sizes="32x32" rel="icon"> 
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="src/style.css">
    <style>
    </style>
</head>
<body>
<div class="app-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Finanzas</h2>
                <button id="toggle-sidebar-close" class="btn-icon">×</button>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="active">Dashboard</a>
                <a href="#">Reportes</a>
                <a href="#">Configuración</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="dashboard-header">
                <button id="toggle-sidebar-open" class="btn-toggle">☰</button>
                <div>
                    <h1>Panel Financiero</h1>
                    <p>Análisis de deuda y capacidad de ahorro</p>
                </div>
            </header>

            <div class="dashboard-layout">
                <section class="stats-area">
                    <div class="resumen-card">
                        <div class="stat-item">
                            <span>Crédito Total Usado</span>
                            <div id="total-deuda-header">$0.00</div>
                        </div>
                        <div class="progress-stack" id="bar-general"></div>
                        <div class="resumen-card">
                        <div class="stat-item">
                        
                        <div class="resumen-grid">
                            <div class="stat-item">
                                <span>Ahorro necesario</span>
                                <div id="total-ahorro" style="font-size: 1.2rem; color: var(--color-ahorro)">$0.00</div>
                            </div>
                            <div class="stat-item">
                                <span>Apalancamiento</span>
                                <div id="total-apalancado-grid" style="font-size: 1.2rem; color: var(--color-apalancado)">$0.00</div>
                            </div>
                            <div class="stat-item">
                                <span>Meses Sin Intereses</span>
                                <div id="total-msi-grid" style="font-size: 1.2rem; color: var(--color-msi)">$0.00</div>
                            </div>
                            <div class="stat-item">
                                <span>Crédito Disponible</span>
                                <div id="total-disponible" style="font-size: 1.2rem; color: var(--color-disponible)">$0.00</div>
                            </div>
                            <div class="stat-item">
                                <span>Utilización</span>
                                <div id="total-utilizacion" style="font-size: 1.2rem; color: #fff;">0%</div>
                            </div>
                        </div>
                    </div>
                    </div>
                    </section>

                <section class="cards-column">
                    <h3>Mis Tarjetas</h3>
                    <div id="tarjetas-container"></div>
                    
                    <button id="btn-nueva-tarjeta" class="tarjeta-agregar-estatica" onclick="abrirModalCrear()">
                        <span class="icono-plus">+</span> Agregar Tarjeta
                    </button>
                </section>
            </div>
        </main>
    </div>
    <div id="modal-tarjeta" class="modal-oculto">
    <div class="modal-contenido">
        <span class="cerrar-modal">&times;</span>
        <h2 id="modal-titulo">Agregar Tarjeta</h2>
        
        <form id="form-tarjeta">
            <input type="hidden" name="action" id="form-action" value="create">
            <input type="hidden" name="id" id="form-id">

            <div class="form-group">
                <label>Nombre de la Tarjeta:</label>
                <input type="text" name="nombre" id="form-nombre" required>
            </div>
            
            <div class="form-group">
                <label>Crédito Total:</label>
                <input type="number" step="0.01" name="credito" id="form-credito" required>
            </div>
            
            <div class="form-group">
                <label>Crédito Disponible:</label>
                <input type="number" step="0.01" name="disponible" id="form-disponible" required>
            </div>
            
            <div class="form-group">
                <label>Saldo Actual:</label>
                <input type="number" step="0.01" name="saldo" id="form-saldo" required>
            </div>
            
            <div class="form-group">
                <label>Saldo a Pagar:</label>
                <input type="number" step="0.01" name="saldoAPago" id="form-saldoAPago" required>
            </div>
            
            <div class="form-group">
                <label>Fecha de Límite de Pago:</label>
                <input type="date" name="fechaPago" id="form-fechaPago" required>
            </div>
            
            <div class="form-group">
                <label>Color Representativo:</label>
                <input type="color" name="color" id="form-color" value="#6366f1">
            </div>
            
            <button type="submit" class="btn-guardar">Guardar Tarjeta</button>
        </form>
    </div>
    </div>

    <script src="src/scrips/utils.js"></script>
    
    <script src="src/scrips/dashboard.js"></script>
    <script src="src/scrips/tarjetas.js"></script>
</body>
</html>
